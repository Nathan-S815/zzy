<!DOCTYPE html>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/0.4.1/html2canvas.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.0.272/jspdf.debug.js"></script>

<body>
<a href="javascript:;" onclick="testFun()">获取url列表</a>
<img src="http://<PUBLIC_HOST>:8184/jzg-files/pic/05b02b86eb7cb6a8cfa87720b2ec7f8220200417154319581.jpg">
<script>

    function testFun() {
        var url = "http://127.0.0.1:8082/sso/getAllSystemUrls";
        $.ajax({
            type: "post",  // 请求方式
            url: url,  // 目标资源
            dataType: "json",  // 服务器响应的数据类型
            success : function (data) {  // readystate == 4 && status == 200
                console.log(data);
            },
            error : function (data) {
                console.log("failed");
                console.log(data);
            }
        });
    }


</script>
